name: nomnom
description: "NomNom - Discover food before you crave it."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.0.4

  # Freezed + Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Maps
  google_maps_flutter: ^2.9.0

  # Video
  video_player: ^2.9.1
  chewie: ^1.8.5

  # Images
  cached_network_image: ^3.4.1

  # Animations
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # UI Utilities
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_animations: ^1.1.1
  glassmorphism: ^3.0.0
  percent_indicator: ^4.2.3
  dotted_border: ^2.1.0

  # Fonts (auto-download via google_fonts)
  google_fonts: ^6.2.1

  # HTTP & API
  http: ^1.2.2
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.2

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  flutter_svg: ^2.0.10+1
  speech_to_text: ^7.0.0
  connectivity_plus: ^6.0.5
  haptic_feedback: ^0.5.1+1
  badges: ^3.1.2
  timeago: ^3.7.0
  carousel_slider: ^5.0.0

  cupertino_icons: ^1.0.8
  flutter_iconly: ^1.0.2
  flutter_stripe: ^11.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.3.5
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - Logo/

  # Fonts via google_fonts package — no manual files needed

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "Logo/NomNomLogo.png"
  min_sdk_android: 21
